# Build singbox-helper as .ipk for every supported Entware architecture
# on every pushed git tag matching v*.*.*, then attach all .ipk files
# to a GitHub Release named after the tag.
#
# Trigger:
#     git tag v1.0.0 && git push --tags
#
# What this workflow does NOT do:
#     - publish to the gh-pages opkg feed (that lives in feed.yml,
#       which runs after this one finishes).
#     - build anything for non-tag pushes. Day-to-day commits never
#       run CI, so the developer keeps the feedback loop free of
#       useless artifacts.

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  # softprops/action-gh-release needs write access to the Releases
  # API. Everything else (checkout, artifacts) is read-only.
  contents: write

jobs:
  build:
    name: build (${{ matrix.opkg_arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - opkg_arch: mipsel-3.4
            goos: linux
            goarch: mipsle
            gomips: softfloat
          - opkg_arch: aarch64-3.10
            goos: linux
            goarch: arm64
            gomips: ''

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: derive version from tag
        id: ver
        # github.ref_name is e.g. "v1.0.0"; opkg-control wants "1.0.0"
        # without the leading v. We expose both.
        run: |
          tag=${GITHUB_REF_NAME}
          ver=${tag#v}
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (control Version: $ver)"

      - name: tests
        # Run the full Go test suite once per matrix entry. They are
        # arch-independent (parser + render + handler unit tests) but
        # cheap (~3 sec) and a failing one should block a release.
        run: go test ./...

      - name: cross-build binary
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${{ steps.ver.outputs.tag }}" \
            -o singbox-helper \
            ./cmd/singbox-helper
          ls -lh singbox-helper

      - name: pack .ipk
        env:
          BINARY:  ./singbox-helper
          PKGVER:  ${{ steps.ver.outputs.ver }}
          PKGARCH: ${{ matrix.opkg_arch }}
          OUTDIR:  ./dist
        run: bash scripts/build-ipk.sh

      - name: upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.opkg_arch }}
          path: dist/*.ipk
          if-no-files-found: error
          retention-days: 7

  release:
    name: gh-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download all .ipk artifacts
        uses: actions/download-artifact@v4
        with:
          # No `name:` -> downloads ALL artifacts uploaded by the
          # build matrix into separate subdirs under ./artifacts/.
          path: artifacts

      - name: flatten artifacts
        run: |
          mkdir -p release
          find artifacts -name '*.ipk' -print -exec mv {} release/ \;
          ls -lh release/

      - name: create GitHub Release with .ipk attachments
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.ipk
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-feed:
    # Publish the opkg-compatible feed under gh-pages so users can
    # `opkg update && opkg install singbox-helper`. We MERGE the
    # current build's .ipk into whatever already exists in the
    # gh-pages branch (so older versions remain installable), then
    # regenerate Packages/Packages.gz over the FULL directory.
    name: publish-feed
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout or init gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$REPO" gh-pages >/dev/null 2>&1; then
            echo "gh-pages exists — cloning"
            git clone --depth=1 --branch gh-pages "$REPO" feed
          else
            echo "gh-pages missing — initialising orphan"
            mkdir feed
            cd feed
            git init -b gh-pages
            git remote add origin "$REPO"
          fi

      - name: download all .ipk artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: merge .ipk into feed and regenerate Packages
        # opkg-utils was dropped from Ubuntu 24.04 repos, so we inline
        # the Packages-index generation. The format is well-defined:
        # for each .ipk we concatenate its control file then append
        # Filename / Size / MD5Sum / SHA256sum, separated by blank
        # lines. opkg parses Packages.gz that way regardless of who
        # wrote it.
        run: |
          set -e
          generate_index() {
            local d="$1"
            : > "$d/Packages"
            for ipk in "$d"/*.ipk; do
              [ -f "$ipk" ] || continue
              local tmp
              tmp=$(mktemp -d)
              tar -xzf "$ipk" -C "$tmp" control.tar.gz
              tar -xzf "$tmp/control.tar.gz" -C "$tmp"
              # Strip a trailing newline from control, then append our
              # extra metadata fields, then a blank-line separator.
              sed -e '$a\' "$tmp/control" >> "$d/Packages"
              {
                printf 'Filename: %s\n'   "$(basename "$ipk")"
                printf 'Size: %s\n'       "$(stat -c%s "$ipk")"
                printf 'MD5Sum: %s\n'     "$(md5sum    "$ipk" | awk '{print $1}')"
                printf 'SHA256sum: %s\n\n' "$(sha256sum "$ipk" | awk '{print $1}')"
              } >> "$d/Packages"
              rm -rf "$tmp"
            done
            gzip -9kf "$d/Packages"
          }
          cd feed
          for arch_dir in ../artifacts/ipk-*; do
            arch=$(basename "$arch_dir" | sed 's/^ipk-//')
            mkdir -p "$arch"
            cp -v "$arch_dir"/*.ipk "$arch/"
            generate_index "$arch"
            ls -lh "$arch/"
          done
          touch .nojekyll
          cat > index.html <<'HTML'
          <!doctype html>
          <html lang="en"><head><meta charset="utf-8">
          <title>singbox-helper opkg feed</title>
          <style>body{font-family:sans-serif;max-width:720px;margin:2em auto;padding:0 1em}
          code,pre{background:#f3f4f6;padding:.2em .4em;border-radius:3px}
          pre{padding:.8em 1em;overflow-x:auto}</style>
          </head><body>
          <h1>singbox-helper opkg feed</h1>
          <p>Add the line for your architecture to <code>/opt/etc/opkg.conf</code> on the router, then:</p>
          <pre>opkg update
          opkg install singbox-helper</pre>
          <h2>Supported architectures</h2>
          <ul>
            <li><a href="mipsel-3.4/">mipsel-3.4</a> — Keenetic / Xiaomi on MT7621 / MT7620 (most common)
              <pre>src/gz singbox-helper https://wolfam0108.github.io/sing-box-helper/mipsel-3.4</pre></li>
            <li><a href="aarch64-3.10/">aarch64-3.10</a> — new Keenetic Hopper / Hero / Giga (ARM64)
              <pre>src/gz singbox-helper https://wolfam0108.github.io/sing-box-helper/aarch64-3.10</pre></li>
          </ul>
          <p><a href="https://github.com/wolfam0108/sing-box-helper">Source on GitHub</a></p>
          </body></html>
          HTML

      - name: commit + push gh-pages
        run: |
          cd feed
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to publish"
            exit 0
          fi
          git commit -m "publish ${{ github.ref_name }}"
          git push origin gh-pages
